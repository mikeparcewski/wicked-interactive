name: Release

# Tag-driven release, aligned with the rest of the wicked ecosystem
# (testing/loom/vault/bus/brain). A `vX.Y.Z` tag push is the ONLY trigger:
# the shared reusable workflow SETS the version from the tag
# (`npm version <X.Y.Z> --no-git-tag-version --allow-same-version`, which runs
# this repo's `version` lifecycle hook in package.json — syncing
# .claude-plugin/plugin.json + marketplace.json), then publishes. So a
# tag-only release works with NO manual manifest pre-bump.
#
# Notes:
# - version_dirs is left at its default (".") so `npm version` runs in the repo
#   root only — that is where the `version` hook lives and where the published
#   package's version must land. frontend/ and site/ are `private: true` and
#   are NOT published from here (site/ deploys via pages.yml); frontend/dist is
#   committed and shipped via package.json "files", so no build/install is
#   needed at publish time (no prepublishOnly hook) — hence no
#   pre_publish_install_dirs.
# - No setup_python: the unit tests (`node --test test/*.test.js`) are pure Node
#   and mock playwright/puppeteer; they never download or launch a browser.
# - enable_sync_pr: true opens a catchup PR so package.json + the plugin
#   manifests on `main` are bumped to the released version after publish — main
#   never lags. This is also why `check:version` (the old drift guard) is no
#   longer needed in the release path; it remains available as
#   `npm run check:version` for local / PR-time consistency checks.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write
  pull-requests: write

jobs:
  release:
    uses: mikeparcewski/wicked-ci/.github/workflows/node-release.yml@d8c9b0a14fb91c2d13f5da0468eeeff983c27e5a # v1.1.2
    with:
      package_name: wicked-interactive
      enable_sync_pr: true
    secrets: inherit
